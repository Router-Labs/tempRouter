services:
  - type: web
    name: temprouter
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Real Phala Intel TDX enclave (public). Drives tdx-live mode.
      - key: TEE_ENDPOINT
        value: https://solrouter-obb4.onrender.com/tee
      # HMAC secret for binding/verifying MPP challenges. NOT a chain key.
      - key: MPP_SECRET_KEY
        generateValue: true
      # Earnings address (where testnet pathUSD payments settle). Address-only:
      # no TEMPO_RECIPIENT_PRIVATE_KEY here, so the server does not cooperatively
      # close — the channel settles to this address on close/timeout.
      - key: TEMPO_RECIPIENT
        value: "0x4d881B146b2199dfC2598FB618eC80410B9aBD46"
      - key: PRICE_PER_UNIT
        value: "0.0002"
      - key: CHUNK_COUNT
        value: "1"
      - key: LOG_LEVEL
        value: info
      - key: NODE_VERSION
        value: "22"
